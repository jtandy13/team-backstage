# Backstage demo project — Continuous Integration and Deployment pipeline.
#
# Push (any branch)  → CI job only, except pushes to main which also run CD.
# Pull request       → CI job (including Playwright e2e + PR report comment).
# Manual (Actions UI)→ CI job only via workflow_dispatch (no deploy).

name: CI/CD Pipeline

on:
  # Run CI on every push, regardless of branch.
  push:
  # Run CI when a PR targets main; CD is never triggered by pull requests.
  pull_request:
    branches: main
  # Allow manual runs from the GitHub Actions tab (Actions → CI/CD Pipeline → Run workflow).
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------------
  # 1. CONTINUOUS INTEGRATION
  # Runs on every push (all branches), pull request, and manual trigger.
  # On non-main pushes, PRs, and manual runs, this is the only job that runs.
  # -----------------------------------------------------------------
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Fetch the repository source so later steps can read files and git history.
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Install Node.js 22 (matches package.json engines) and cache Yarn dependencies
      # using the root yarn.lock file to speed up subsequent workflow runs.
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      # Install all workspace dependencies with Yarn 4.
      # --immutable fails the job if yarn.lock is out of sync with package.json files.
      - name: Install Dependencies
        run: yarn install --immutable

      # Run ESLint across every package in the monorepo.
      # Uses lint:all (not lint) because lint only checks packages changed since origin/main.
      - name: Run Linter
        run: yarn lint:all

      # Verify Prettier formatting without rewriting files.
      - name: Run Code Formatting Check
        run: yarn prettier:check

      # Scan installed packages for known vulnerabilities.
      # Yarn 4 uses "yarn npm audit" instead of the classic "yarn audit" command.
      - name: Run Security Audit
        run: yarn npm audit --all --recursive --severity critical

      # Execute unit and integration tests for all packages in non-interactive CI mode.
      - name: Run Automated Tests
        run: yarn test
        env:
          CI: true

      # Generate TypeScript declarations required by backstage-cli package builds.
      - name: Generate TypeScript Declarations
        run: yarn tsc

      # Build the frontend app, backend, and plugins via the Backstage CLI.
      - name: Build Application
        run: yarn build:all

      # Upload build output for the CD job to download.
      # Only on pushes to main — other branches, PRs, and manual runs skip this.
      - name: Upload Build Artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: |
            packages/app/dist/
            packages/backend/dist/
            plugins/**/dist/
          retention-days: 1

      # -----------------------------------------------------------------
      # E2E tests (pull requests to main only)
      # Runs Playwright against the built backend and posts the HTML report
      # summary to the pull request as a comment.
      # -----------------------------------------------------------------
      - name: Install Playwright Browsers
        if: github.event_name == 'pull_request'
        run: yarn playwright install --with-deps chromium

      - name: Run E2E Tests
        if: github.event_name == 'pull_request'
        run: bash .github/scripts/run-e2e.sh
        env:
          CI: true
          BACKSTAGE_TEST_DISABLE_DOCKER: 1
          POSTGRES_HOST: localhost
          POSTGRES_PORT: ${{ job.services.postgres.ports[5432] }}
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          GITHUB_TOKEN: e2e-ci-token

      - name: Upload Playwright HTML Report
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: |
            e2e-test-report/
            playwright-results.json
          retention-days: 14

      - name: Post Playwright Report to PR
        if: always() && github.event_name == 'pull_request' && hashFiles('playwright-results.json') != ''
        uses: daun/playwright-report-summary@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          report-file: playwright-results.json
          report-tag: ci-e2e-${{ github.run_id }}
          comment-title: Playwright E2E test results
          test-command: yarn test:e2e
          footer: |
            ### HTML report

            Download the full interactive Playwright HTML report from the [**playwright-html-report** workflow artifact](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

  # -----------------------------------------------------------------
  # 2. CURSOR CODE REVIEW (pull requests to main only)
  # Runs on PR open (draft or ready) and when new commits are pushed.
  # Posts/updates four focused PR comments (quality, bugs, security,
  # best practices) and fails when any agent reports critical issues.
  # -----------------------------------------------------------------
  code-review:
    name: Cursor Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'synchronize') &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install Cursor CLI and jq
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH
          sudo apt-get update
          sudo apt-get install -y jq

      # --- Code quality & readability ---
      - name: Review code quality and readability
        id: review-quality
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REVIEW_FOCUS: Code quality and readability
          REVIEW_TITLE: Code Quality & Readability
          COMMENT_MARKER: cursor-code-review:quality
          REVIEW_BODY_FILE: review-quality.md
          AGENT_OUTPUT_FILE: /tmp/agent-output-quality.json
        run: bash .github/scripts/cursor-code-review.sh

      - name: Find existing quality review comment
        id: fc-quality
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: <!-- cursor-code-review:quality -->

      - name: Create or update quality review comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.fc-quality.outputs.comment-id }}
          body-path: review-quality.md

      # --- Potential bugs or issues ---
      - name: Review potential bugs or issues
        id: review-bugs
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REVIEW_FOCUS: Potential bugs or issues
          REVIEW_TITLE: Potential Bugs & Issues
          COMMENT_MARKER: cursor-code-review:bugs
          REVIEW_BODY_FILE: review-bugs.md
          AGENT_OUTPUT_FILE: /tmp/agent-output-bugs.json
        run: bash .github/scripts/cursor-code-review.sh

      - name: Find existing bugs review comment
        id: fc-bugs
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: <!-- cursor-code-review:bugs -->

      - name: Create or update bugs review comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.fc-bugs.outputs.comment-id }}
          body-path: review-bugs.md

      # --- Security considerations ---
      - name: Review security considerations
        id: review-security
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REVIEW_FOCUS: Security considerations
          REVIEW_TITLE: Security Considerations
          COMMENT_MARKER: cursor-code-review:security
          REVIEW_BODY_FILE: review-security.md
          AGENT_OUTPUT_FILE: /tmp/agent-output-security.json
        run: bash .github/scripts/cursor-code-review.sh

      - name: Find existing security review comment
        id: fc-security
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: <!-- cursor-code-review:security -->

      - name: Create or update security review comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.fc-security.outputs.comment-id }}
          body-path: review-security.md

      # --- Best practices compliance ---
      - name: Review best practices compliance
        id: review-best-practices
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REVIEW_FOCUS: Best practices compliance
          REVIEW_TITLE: Best Practices Compliance
          COMMENT_MARKER: cursor-code-review:best-practices
          REVIEW_BODY_FILE: review-best-practices.md
          AGENT_OUTPUT_FILE: /tmp/agent-output-best-practices.json
        run: bash .github/scripts/cursor-code-review.sh

      - name: Find existing best practices review comment
        id: fc-best-practices
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: <!-- cursor-code-review:best-practices -->

      - name: Create or update best practices review comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.fc-best-practices.outputs.comment-id }}
          body-path: review-best-practices.md

      - name: Enforce blocking review
        if: >
          steps.review-quality.outputs.critical_issues_found == 'true' ||
          steps.review-bugs.outputs.critical_issues_found == 'true' ||
          steps.review-security.outputs.critical_issues_found == 'true' ||
          steps.review-best-practices.outputs.critical_issues_found == 'true'
        run: |
          echo "Critical issues were found during code review. Blocking merge."
          exit 1

  # -----------------------------------------------------------------
  # 3. CONTINUOUS DEPLOYMENT (push to main only)
  # Simulated deployment — no hosting provider is configured yet.
  # Skipped for feature-branch pushes, pull requests, and manual runs.
  # -----------------------------------------------------------------
  cd:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: ci
    # Gate: deploy only when code is pushed directly to main.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Retrieve the repository source and dependencies for post-deploy e2e tests.
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      - name: Install Dependencies
        run: yarn install --immutable

      # Retrieve the build output produced by the CI job.
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-assets
          path: build-assets/

      - name: Restore Build Output
        run: |
          cp -r build-assets/packages/app/dist packages/app/dist
          cp -r build-assets/packages/backend/dist packages/backend/dist
          find build-assets/plugins -type d -name dist | while read -r dist_dir; do
            plugin_dir="${dist_dir#build-assets/}"
            plugin_root="$(dirname "$plugin_dir")"
            mkdir -p "$plugin_root"
            cp -r "$dist_dir" "$plugin_dir"
          done

      # Placeholder for future secret injection and provider authentication
      # (e.g. kubectl, AWS CLI, Docker registry login).
      - name: Authenticate and Configure Environment
        run: |
          echo "Injecting target environment secrets..."
          echo "Simulating authentication with hosting provider..."

      # Placeholder deployment — replace with real deploy commands when a
      # platform (Kubernetes, Docker, static hosting, etc.) is configured.
      - name: Execute Final Deployment
        run: |
          echo "========================================================="
          echo "DEPLOYMENT SUCCESSFUL!"
          echo "Artifact deployed successfully via Backstage Software Template."
          echo "Target Environment: Demo/Production"
          echo "Timestamp: $(date -u)"
          echo ""
          echo "Build artifacts received:"
          find build-assets -type f | head -20
          echo "========================================================="

      # Placeholder post-deploy check — replace with real HTTP health checks
      # against the deployed Backstage frontend and backend URLs.
      - name: Post-Deployment Health Smoke Test
        run: |
          echo "Running post-deployment sanity checks..."
          echo "Status: Active (200 OK)"

      # -----------------------------------------------------------------
      # E2E tests (merge to main / CD flow)
      # Post-deployment smoke tests using Playwright against the built app.
      # -----------------------------------------------------------------
      - name: Install Playwright Browsers
        run: yarn playwright install --with-deps chromium

      - name: Run E2E Tests
        run: bash .github/scripts/run-e2e.sh
        env:
          CI: true
          BACKSTAGE_TEST_DISABLE_DOCKER: 1
          POSTGRES_HOST: localhost
          POSTGRES_PORT: ${{ job.services.postgres.ports[5432] }}
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          GITHUB_TOKEN: e2e-ci-token

      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report-cd
          path: |
            e2e-test-report/
            playwright-results.json
          retention-days: 14
